name: Bug Report
description: Report a bug in the LLM Cost Tracking Bundle
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Configure the bundle with ...
        2. Make an LLM call using ...
        3. Open the profiler ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "8.3"
    validations:
      required: true

  - type: input
    id: symfony-version
    attributes:
      label: Symfony Version
      placeholder: "7.4"
    validations:
      required: true

  - type: input
    id: bundle-version
    attributes:
      label: Bundle Version
      placeholder: "1.0.0"
    validations:
      required: true
